syntax = "proto3";

message KeyValueVersion {
    string key = 1;
    string value = 2;
    uint64 version = 3;
}

message KeyVersion {
    string key = 1;
    uint64 version = 2;
}

message ValueVersion {
    string value = 1;
    uint64 version = 2;
}

message Request {
    enum ReqType {
      PING = 0;
      PUT = 1;
      GET = 2;
      FUNC = 3;
      VALIDATE = 4;
      BEGIN_TX = 5;
      CLEAR = 6;
    }
    ReqType reqtype = 1;
    string key = 2;
    ValueVersion payload = 3;
    string client_id = 4;
    repeated KeyVersion read_set = 5;
    repeated KeyValueVersion write_set = 6;
}

message Response {
    enum RespType {
      NONE = 0;
      GET = 1;
      PUT = 2;
      FUNC = 3;
      VALIDATE = 4;
    }
    RespType resptype = 1;
    string key = 2;
    ValueVersion payload = 3;
    string client_id = 4;
    bool ok = 5;
    repeated KeyValueVersion update_set = 6;
}